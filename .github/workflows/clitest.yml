name: Build and Scan Nginx Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    environment: Cortex        
    env:                       
      CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
      CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
      CORTEX_API_URL: https://api-pcscortexcloud.xdr.us.paloaltonetworks.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Nginx Image
        run: |
          docker pull nginx:latest
          docker tag nginx:latest my-nginx-app:latest

      - name: Download cortexcli
        run: |
          echo "URL is: ${CORTEX_API_URL}"
          crtx_resp=$(curl -s -H "x-xdr-auth-id: ${CORTEX_API_KEY_ID}" -H "Authorization: ${CORTEX_API_KEY}" "${CORTEX_API_URL}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64")
          # Some Cortex versions use .reply, others use .signed_url. 
          # This line handles both by checking for signed_url first.
          crtx_url=$(echo $crtx_resp | jq -r '.signed_url // .reply')
          
          curl -L -o cortexcli "$crtx_url"
          chmod +x cortexcli

      - name: Scan Image with Cortex
        run: |
          ./cortexcli images scan my-nginx-app:latest \
            --api-base-url "${CORTEX_API_URL}" \
            --api-key "${CORTEX_API_KEY}" \
            --api-key-id "${CORTEX_API_KEY_ID}"
