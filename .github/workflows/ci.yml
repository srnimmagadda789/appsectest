name: Build and Scan Nginx Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    environment: Cortex
    env:
      CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
      CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
      CORTEX_API_URL: ${{ secrets.CORTEX_API_URL }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Nginx Image
        run: |
          # Pulling the official image to simulate a build if no Dockerfile exists
          docker pull nginx:latest
          docker tag nginx:latest my-nginx-app:latest

      - name: Download cortexcli
        run: |
          # Use -s to keep logs clean and -H for headers
          crtx_resp=$(curl -s -H "x-xdr-auth-id: ${CORTEX_API_KEY_ID}" -H "Authorization: ${CORTEX_API_KEY}" "${CORTEX_API_URL}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64")
          
          # Extract the URL. Note: Ensure the key is "signed_url" or "reply" based on your API version
          crtx_url=$(echo $crtx_resp | jq -r ".signed_url")
          
          # Use -L to follow redirects to the download storage
          curl -L -o cortexcli "$crtx_url"
          chmod +x cortexcli
          ./cortexcli --version

      - name: Scan Image with Cortex
        run: |
          # Ensure the binary is called correctly from the current directory
          ./cortexcli images scan my-nginx-app:latest \
            --api-base-url "${CORTEX_API_URL}" \
            --api-key "${CORTEX_API_KEY}" \
            --api-key-id "${CORTEX_API_KEY_ID}"
